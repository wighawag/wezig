name: mobile-android

# The Android toolchain leg (task android-toolchain-ndk-crosslink, spec
# explore-mobile-shell Q2/stories 1,3): prove the wezig Zig static lib — INCLUDING
# its stb_truetype C dep — cross-compiles + links for both Android ABIs against
# the NDK sysroot, and packages into a minimal APK that loads the lib via a JNI
# shim and shows one android.webkit.WebView. A DEDICATED leg (ADR-0007 discipline).
#
# This task's floor is: it BUILDS to an installable APK. The on-emulator RUN proof
# is delegated to the CI verification-legs task (mobile-verification-legs-ci) on a
# KVM Linux runner. ABIs: arm64-v8a (device) + x86_64 (emulator); API 26 floor.
#
# Manual/opt-in plus a path-filtered push trigger so it runs on mobile-Android or
# shared mobile-ABI/build changes, never competing with the core gate.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/android/**"
      - "src/mobile_abi.zig"
      - "build.zig"
      - ".github/workflows/mobile-android.yml"

permissions:
  contents: read

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install the pinned NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Cross-compile the wezig Zig static libs for both ABIs (NDK sysroot)
        run: mobile/android/build-zig-libs.sh

      - name: Set up Gradle 8.7 (AGP 8.5-compatible)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build the debug APK (installable-APK floor)
        working-directory: mobile/android
        run: gradle assembleDebug --no-daemon

      - name: Show the built APK + confirm the JNI .so links the Zig core
        working-directory: mobile/android
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          echo "APK: $APK"
          ls -la "$APK"
          # The APK must contain libwezigshell.so for both ABIs (which statically
          # links the Zig core). unzip -l lists the packaged native libs.
          unzip -l "$APK" | grep -E 'lib/(arm64-v8a|x86_64)/libwezigshell.so' \
            || { echo "FAIL: JNI .so missing from APK"; exit 1; }
          echo "PASS: APK built with libwezigshell.so (Zig core linked) for both ABIs."

      - name: Upload the APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wezig-android-debug-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
