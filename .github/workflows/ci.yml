name: ci

# CI runs the acceptance gate on every push to main and on every pull request,
# so a regression is caught here, not only by a human driving locally. This is
# distinct from release.yml (tag-triggered build+publish via goreleaser):
# CI = every push/PR gate; release = cut a versioned build. They do not share a job.
#
# The gate below IS `dorfl.json` `verify` verbatim (fmt check + build + test):
# both call `zig` directly, so "green locally" and "green in CI" are the same
# command. The Zig version lives in ONE place, `build.zig.zon`'s
# `minimum_zig_version`: setup-zig with an empty `version` resolves it from there,
# and `build.zig` asserts the running Zig matches it (so any drift — local or CI
# — fails fast). Bump the version in `build.zig.zon` alone.
#
# Further DEDICATED legs (`harfbuzz`, `networking`, `gpu`) run the provisioned
# spike proofs of `explore-native-renderer` (real shaping; bound fetch+verify;
# the page-facing WebGPU/WebGL frame) — each needs a provisioned system dep and/or
# live resource the bare `gate` job never installs (ADR-0007), so they stay off
# the core display-free gate and green here.
#
# A SECOND job (`webview`) runs the headless WebKitGTK/GTK4 shell proofs
# (`shell-test`/`shell-bridge-test`/`shell-scheme-test`) under Xvfb. ADR-0007
# requires these as a DEDICATED leg (they need `xvfb` + `libwebkitgtk-6.0-dev`
# and are NOT part of the display-free `zig build test` gate); keeping them a
# separate job means the core gate stays fast + display-free and a webview-path
# regression is distinguishable from a core regression. The `gate` job is the
# release-blocking acceptance bar; `webview` guards the optional shell path.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version
        # (the single source of truth for the pinned Zig version).
        uses: mlugg/setup-zig@v2

      - name: Run the dorfl.json verify gate (fmt + build + test)
        run: zig fmt --check . && zig build && zig build test

  # The headless webview proofs (ADR-0007): a DEDICATED leg, separate from the
  # display-free `gate` above. It provisions the shell's system dependencies
  # (WebKitGTK 6.0 / GTK4 via pkg-config) plus the Xvfb virtual display
  # (`xvfb-run` needs `xauth`), then runs each `shell-*` step. These build the
  # shell executable (which links webkitgtk-6.0) and drive a real page through
  # the two seams under `xvfb-run` — proving the WebKitGTK backend, the
  # script-message bridge, and the custom-scheme interception end-to-end. It
  # also runs `ipfs-secure-origin-test` (ADR-0015 d.7): `ipfs://` declared secure
  # THROUGH the `Renderer` seam is reported secure by WebKitGTK's
  # `WebKitSecurityManager`, and a CID body served through the interception hook
  # renders on that secure origin. SERVICE-WORKER hosting on `ipfs://` is OUT of
  # scope (ADR-0016) — delivered separately by `spike-webkitgtk-sw-scheme-patch`.
  webview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Install the shell's system dependencies (WebKitGTK 6.0 / GTK4 + Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libwebkitgtk-6.0-dev xvfb xauth

      - name: Run the headless shell proofs under Xvfb (NOT in the core gate)
        # GitHub runners have no real GPU and a restricted sandbox, so WebKitGTK's
        # default DMABUF/GPU renderer and its bubblewrap sandbox crash the process
        # (SIGTRAP / exit 133) even though the page never needs the GPU. Force the
        # software path and disable the (unusable-in-CI) sandbox for these headless
        # proofs. These env vars scope to this step only — the interactive
        # `zig build shell` on a real desktop is untouched.
        env:
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
        run: |
          zig build shell-test
          zig build shell-bridge-test
          zig build shell-scheme-test
          zig build ipfs-secure-origin-test

  # The HarfBuzz text-shaping spike (ADR-0007, spec explore-native-renderer):
  # a DEDICATED leg, separate from the display-free `gate` above, for the SAME
  # reason the `webview` leg is separate — it needs a provisioned SYSTEM library
  # (HarfBuzz via pkg-config), which the bare `gate` job never installs. The
  # discriminator is "needs provisioning", not display-freeness: this proof is
  # display-free (it paints into an offscreen surface, no window/Xvfb), but
  # HarfBuzz is a system dep just like WebKitGTK, so it stays off the core gate
  # and green here. It builds the spike test (which links harfbuzz) and shapes
  # one non-trivial string behind the `PaintBackend` seam, proving a rendering
  # (a `liga` ligature) the v0 stb codepoint path cannot produce.
  harfbuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Install the shaping spike's system dependency (HarfBuzz)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libharfbuzz-dev

      - name: Run the HarfBuzz shaping spike (NOT in the core gate)
        run: zig build harfbuzz-shape-test

  # The networking fetch+verify spike (ADR-0007, spec explore-native-renderer):
  # a DEDICATED leg, separate from the display-free `gate`, for the SAME reason
  # the `harfbuzz`/`webview` legs are separate — it binds a provisioned SYSTEM
  # library (libcurl + its TLS backend via pkg-config), which the bare `gate` job
  # never installs, AND its compatibility-floor proof is a LIVE `https://` fetch
  # needing network egress. The pure SEAM + hash-verify THESIS run in the core
  # `gate` (src/networking.zig, no system dep, no network); this leg proves the
  # BOUND stack: it fetches one ordinary https resource through libcurl+TLS (never
  # hand-written TLS) and hash-verifies a content-addressed fetch over the same
  # bound transport. `-Dnetworking-live` opts the live legs in.
  networking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Install the networking spike's system dependency (libcurl + TLS)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libcurl4-openssl-dev

      - name: Run the networking fetch+verify spike (NOT in the core gate)
        run: zig build -Dnetworking-live networking-fetch-test

  # The wallet-broker out-of-process round-trip spike (ADR-0007, ADR-0015 d.5,
  # spec explore-web3-capabilities story 1): a DEDICATED leg, separate from the
  # display-free `gate`, for the SAME reason the `networking`/`harfbuzz`/`webview`
  # legs are separate. The discriminator here is NOT a system dep (the broker is
  # pure Zig, no apt provisioning) but that its proof SPAWNS A LIVE CHILD PROCESS
  # (the real broker sandbox boundary): the provider<->broker MESSAGE CONTRACT +
  # the eth_requestAccounts round-trip run IN the core `gate` (src/wallet_broker.zig,
  # a fake bridge + fake broker, no process); THIS leg proves the boundary is a
  # REAL PROCESS boundary — one origin-bound eth_requestAccounts round-trips from
  # the parent (page/provider side) to a SEPARATE broker child holding the
  # THROWAWAY test key in its own address space, and back, over the child's stdio.
  # The key never crosses; only the account address does. `-Dwallet-broker-live`
  # opts the live spawn in (set by the step); with it off a bare run compiles+links
  # and skips the spawn, so nothing load-bearing depends on being able to spawn.
  wallet-broker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Run the wallet-broker out-of-process round-trip spike (NOT in the core gate)
        run: zig build -Dwallet-broker-live wallet-broker-roundtrip-test

  # The page-facing GPU spike (ADR-0007, spec explore-native-renderer story 3/6):
  # a DEDICATED leg, separate from the display-free `gate`, for the SAME reason the
  # `harfbuzz`/`networking`/`webview` legs are separate — it links provisioned GPU
  # stacks (EGL/GLES system libs for the WebGL leg; the fetched `wgpu-native`
  # prebuilt for the WebGPU leg) AND its render proof needs a HEADLESS GPU DRIVER
  # (Mesa `llvmpipe` for GL; lavapipe via `mesa-vulkan-drivers` for wgpu-native's
  # Vulkan backend), none of which the bare `gate` job provisions. It draws ONE
  # WebGPU frame (via the chosen leaf wgpu-native) and ONE WebGL frame from one
  # shader each into a page-`<canvas>`-facing offscreen surface and verifies the
  # rendered pixel. `-Dgpu-live` opts the live render legs in; `-Dwgpu-native-path`
  # wires in the fetched prebuilt so the WebGPU leg compiles. `LIBGL_ALWAYS_SOFTWARE`
  # forces Mesa's software rasteriser (runners have no GPU) and `XDG_RUNTIME_DIR`
  # is set because the Vulkan loader requires it.
  gpu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Install the GPU spike's system dependencies (Mesa GL + EGL + lavapipe Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dri mesa-vulkan-drivers libvulkan-dev

      - name: Fetch the chosen GPU leaf (wgpu-native prebuilt) for the WebGPU leg
        run: |
          mkdir -p wgpu-native
          curl -sSL -o wgpu.zip \
            https://github.com/gfx-rs/wgpu-native/releases/download/v25.0.2.2/wgpu-linux-x86_64-release.zip
          unzip -q wgpu.zip -d wgpu-native

      - name: Run the page-facing GPU frame spike (NOT in the core gate)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          XDG_RUNTIME_DIR: /tmp/xdg-runtime
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          LD_LIBRARY_PATH="$PWD/wgpu-native/lib" \
            zig build -Dgpu-live -Dwgpu-native-path="$PWD/wgpu-native" page-gpu-frame-test
