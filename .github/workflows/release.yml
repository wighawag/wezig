name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Three jobs attach downloadable artifacts to the ONE GitHub Release for the tag:
#   - goreleaser: the desktop Linux binaries (amd64, arm64) + docs archives +
#     checksums + the conventional-commit changelog. It CREATES the release.
#   - android-apk: the installable (unsigned debug) Android APK, sideloadable on
#     a device/emulator.
#   - ios-simulator-app: the iOS SIMULATOR .app (aarch64-ios-simulator), zipped.
#     Runs in the iOS Simulator on a Mac (NOT a physical device — device/store
#     builds need signing, which is out of scope). Clearly labelled as such.
# The two mobile jobs run AFTER goreleaser (needs:) so the release exists to
# upload into, and use `gh release upload` against the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version
        # (the single source of truth for the pinned Zig version).
        uses: mlugg/setup-zig@v2

      - name: Run the acceptance gate (fmt + build + test)
        # Same gate as dorfl.json verify / ci.yml, so a tag build can't ship a
        # red tree.
        run: zig fmt --check . && zig build && zig build test

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---- Android APK: build the installable (unsigned debug) APK and attach it --
  # The same Zig->NDK->Gradle path the mobile-android CI leg proves. Produces an
  # UNSIGNED debug APK (sideloadable; a signed release APK needs a keystore,
  # which is out of the exploration's scope). Renamed with the tag and uploaded.
  android-apk:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install the pinned NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Cross-compile the wezig Zig static libs for both ABIs (NDK sysroot)
        run: mobile/android/build-zig-libs.sh

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build the debug APK
        working-directory: mobile/android
        run: gradle assembleDebug --no-daemon

      - name: Upload the APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find mobile/android/app/build/outputs/apk -name '*.apk' | head -1)
          OUT="wezig_${GITHUB_REF_NAME}_android_debug_unsigned.apk"
          cp "$APK" "$OUT"
          gh release upload "$GITHUB_REF_NAME" "$OUT" --clobber

  # ---- iOS Simulator app: build the .app, zip it, and attach it -------------
  # The Zig->Swift WKWebView shell the mobile-ios CI leg proves, built for the
  # iOS SIMULATOR (aarch64-ios-simulator). This runs in Xcode's iOS Simulator on
  # a Mac; it is NOT a device/App-Store build (those need signing, out of scope).
  # Zipped and uploaded, clearly labelled "ios-simulator".
  ios-simulator-app:
    needs: goreleaser
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Build the iOS Simulator .app (build only, no launch)
        # Reuse the proven build steps from build-and-run.sh, but stop after the
        # .app is assembled (BUILD_ONLY skips the simulator boot/launch).
        env:
          BUILD_ONLY: "1"
        run: mobile/ios/build-and-run.sh

      - name: Zip + upload the Simulator app to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT="wezig_${GITHUB_REF_NAME}_ios-simulator_app.zip"
          ( cd mobile/ios/build && ditto -c -k --sequesterRsrc --keepParent WezigShell.app "../../../$OUT" )
          gh release upload "$GITHUB_REF_NAME" "$OUT" --clobber
