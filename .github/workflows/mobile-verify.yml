name: mobile-verify

# The DEDICATED mobile verification legs (spec build-mobile-shell, stories 7/11)
# â€” the mobile analogue of the desktop Xvfb `shell-test`/`shell-bridge-test`/
# `shell-scheme-test` steps in `ci.yml`. Each leg proves the mobile shell
# END-TO-END on a real webview WITHOUT a physical device, against the REAL
# maintained platform apps (NOT the exploration spike harnesses â€” task
# mobile-verify-legs-real-app repointed them), asserting:
#   1. navigate one real page THROUGH the pinned seam,
#   2. a `.finished` `LifecycleEvent` reaches a seam subscriber,
#   3. the view renders NON-BLANK (a snapshot with >1 distinct pixel),
#   4. a backgroundâ†’foreground round-trip PRESERVES the current page (story 4).
#
#   - iOS  (`macos-14`): builds + runs the REAL Xcode app
#     (`mobile/ios/App/WezigShell.xcodeproj`) on an iOS 17 Simulator via
#     `simctl`. The renderer RUN proof + the state-restoration assertion are the
#     app's `--wezig-verify` self-check (`ios-shell`); the embedding + bridge +
#     scheme SEAM proofs are folded into the app's XCTest target and run via
#     `xcodebuild test` (`ios-seam-proofs`).
#   - Android (`ubuntu-latest`, KVM-accelerated): builds + installs the REAL app
#     module APK and runs its instrumented test target (`connectedDebugAndroidTest`),
#     which drives ALL of them over `android.webkit.WebView`: `ShellSeamTest`
#     (navigate + `.finished` + non-blank + state-restoration) plus the
#     renderer / embedding / bridge / scheme `*SeamTest`/`*ProofTest`s â€” all
#     against the real app module's controllers.
#
# WHY A DEDICATED, OFF-THE-HOT-PATH WORKFLOW (ADR-0007 discipline):
#   - The core `zig build test` gate in `ci.yml` stays DEVICE-FREE â€” only the
#     `Fake*`/seam-contract tests run there; no simulator/emulator dependency
#     leaks in (ci.yml never references mobile).
#   - These proofs are EXPENSIVE (iOS needs macOS runner minutes â€” free +
#     unlimited on this public repo, but ~10Ă— slower than Linux; the Android
#     emulator boot is minutes of KVM warm-up), so they run NIGHTLY + ON-DEMAND,
#     never per-PR/push. The path-filtered `mobile-ios`/`mobile-android` legs
#     cover the fast BUILD proofs (building the REAL projects) on the hot path;
#     THIS workflow owns the RUN proofs.
#
# HOW TO RUN / READ:
#   - On demand: Actions tab -> "mobile-verify" -> "Run workflow" (workflow_dispatch).
#   - Nightly: the `schedule` cron below (03:17 UTC â€” an off-peak, non-round minute
#     to avoid the top-of-hour scheduler stampede).
#   - Read a run: `gh run list --workflow mobile-verify.yml` then
#     `gh run view <id> --log` (each job prints its PASS/FAIL lines).
#
# GROUND TRUTH:
#   - GitHub's Linux runners provide KVM, so the x86_64 Android emulator is
#     hardware-accelerated in CI.
#   - `macos-14` ships Xcode 15.4 + iOS 17 Simulator runtimes (SDK ceiling 17;
#     deployment-target floor stays iOS 16.0). Simulator builds need NO signing.
on:
  workflow_dispatch:
  schedule:
    # Nightly at 03:17 UTC. NOT on push/PR â€” see the rationale above.
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  # ---- iOS SHELL verify: the renderer RUN proof + state restoration, against
  # the REAL app (spec build-mobile-shell stories 4/7). Drives the real Xcode app
  # (mobile/ios/App/WezigShell.xcodeproj) on an iOS 17 Simulator and asserts the
  # mobile-verify facts AGAINST THE MAINTAINED APP (not a spike harness):
  # navigate one page THROUGH the seams + a `.finished` lifecycle event reaching
  # the chrome + a non-blank snapshot, PLUS the story-4 assertion that a
  # backgroundâ†’foreground round-trip preserves the page. The app self-checks
  # under `--wezig-verify` (ShellVerify.swift), driving the SAME seams a user does.
  ios-shell:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode + available iOS runtimes
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        uses: mlugg/setup-zig@v2

      - name: Browse one page + survive background/foreground in the real app on an iOS 17 Simulator
        run: mobile/ios/shell-verify.sh

  # ---- iOS SEAM proofs: embedding + bridge + scheme, folded into the REAL app's
  # XCTest target (spec build-mobile-shell stories 7/11; ADR-0009's Q3/story-6
  # embedding + story-8 bridge + story-9 scheme seam-parity proofs). Runs
  # `xcodebuild test` on the real WezigShell.xcodeproj (its "Build Zig static
  # lib" phase builds the Zig core as a normal step), so the three seam proofs
  # run through the MAINTAINED app, not the old hand-assembled `*-proof.sh`
  # swiftc binaries (removed). The Android twin runs the same three as
  # instrumented tests in the real app module (`android-emulator`).
  ios-seam-proofs:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode + available iOS runtimes
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Run the embedding + bridge + scheme seam proofs against the real app on an iOS 17 Simulator
        run: mobile/ios/seam-proofs.sh

  # ---- Android leg: the REAL app module APK + its instrumented test target on a
  # KVM x86_64 emulator. Builds + installs the REAL app module APK and runs
  # `connectedDebugAndroidTest`, which runs the whole instrumented test target
  # against the real controllers (Java -> Zig backends -> android.webkit.WebView):
  # `ShellSeamTest` (navigate + `.finished` + non-blank + backgroundâ†’foreground
  # state restoration) plus the renderer / embedding / bridge / scheme
  # `*SeamTest`/`*ProofTest`s. No spike script â€” a plain `gradle
  # connectedDebugAndroidTest` builds everything (the Zig lib is a normal Gradle
  # `buildZigLibs` step).
  android-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable KVM (hardware-accelerated emulator on the Linux runner)
        # GitHub's Linux runners expose /dev/kvm; the runner user must be in the
        # kvm group for `-accel kvm`. Without this the emulator falls back to a
        # (far slower, often flaky) software renderer.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install the pinned NDK
        # Match the mobile-android BUILD leg's NDK exactly so the Gradle-built
        # Zig static lib links against the same bionic sysroot (Gradle resolves
        # this NDK via ndkVersion for its `buildZigLibs` step).
        run: |
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Set up Zig
        # Empty version => resolved from build.zig.zon's minimum_zig_version.
        # The Gradle build cross-compiles the Zig static lib itself (the
        # `buildZigLibs` task the native build depends on), so no out-of-band
        # script â€” Zig just needs to be on PATH.
        uses: mlugg/setup-zig@v2

      - name: Set up Gradle 8.7 (AGP 8.5-compatible)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Assemble the debug APK + the instrumented-test APK
        # Pre-build both APKs OUTSIDE the emulator step so the (slow) emulator is
        # only alive for the install + test run, keeping its window minimal.
        working-directory: mobile/android
        run: gradle assembleDebug assembleDebugAndroidTest --no-daemon

      - name: Boot a headless x86_64 emulator + run the instrumented shell + seam proofs
        # A KVM-accelerated x86_64 emulator (API 26 floor, `-no-window`), then
        # `gradle connectedDebugAndroidTest` installs both APKs via adb and runs
        # the whole instrumented test target against the REAL app module.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect -accel on
          disable-animations: true
          working-directory: mobile/android
          script: gradle connectedDebugAndroidTest --no-daemon
